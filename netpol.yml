apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: library-app-netpol
  namespace: flm
spec:
  podSelector:
    matchLabels:
      app: app-service
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: controller
      ports:
        - protocol: TCP
          port: 5000

  egress:
    - to:
        - podSelector:
            matchLabels:
              app: db
      ports:
        - protocol: TCP
          port: 3306

    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
